name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-debian:
    name: Build Debian release artifact (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: armhf
            platform: linux/arm/v7
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: Remove old release artifacts
        run: rm -f ../kel-agent_*

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Debian package in Debian stable container
        run: |
          docker run --rm --platform "${{ matrix.platform }}" \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            debian:stable \
            bash -c '
              set -euxo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                autorevision \
                build-essential \
                ca-certificates \
                debhelper \
                dh-golang \
                dpkg-dev \
                fakeroot \
                git \
                golang-any \
                libhamlib-dev \
                make \
                wget
              make deb-package-ci
            '
          mkdir -p dist
          cp ../kel-agent_*_${{ matrix.arch }}.deb dist/

      - name: Verify shared library dependencies
        run: |
          echo "==> Checking .deb contents"
          dpkg-deb -c dist/kel-agent_*_${{ matrix.arch }}.deb
          echo "==> Checking binary dependencies"
          dpkg-deb -x dist/kel-agent_*_${{ matrix.arch }}.deb /tmp/deb-extract
          ldd /tmp/deb-extract/usr/bin/kel-agent || true

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: dist/kel-agent_*_${{ matrix.arch }}.deb
          if-no-files-found: error

  release-flatpak:
    name: Build the Flatpak release artifact
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-20.08
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: kel-agent.flatpak
          manifest-path: flatpak/radio.k0swe.Kel_Agent.yml
          branch: main
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: kel-agent.flatpak
          if-no-files-found: error

  release-macos:
    name: Build the MacOS release artifact
    runs-on: macos-latest

    steps:
      - name: Install WhiteBox Packages
        run: |
          curl "http://s.sudre.free.fr/Software/files/Packages.dmg" --output ${HOME}/Packages.dmg
          sudo hdiutil attach ${HOME}/Packages.dmg
          find /Volumes -name "Install Packages.pkg" | xargs -I {} sudo installer -pkg "{}" -target /

      - name: Create keychain with signing certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          keychain: k0swe
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24.x

      - name: Build Hamlib
        run: |
          brew install automake libtool
          make hamlib

      - name: Test
        run: make test

      - name: Build Mac package
        run: make mac-package

      - name: Verify shared library dependencies
        run: otool -L kel-agent

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: kel-agent_mac.pkg
          if-no-files-found: error

  release-windows:
    name: Build the Windows release artifact
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          # https://packages.debian.org/stable/golang
          go-version: 1.24.x

      - name: Build Hamlib
        shell: bash
        run: make hamlib

      - name: Test
        run: make test

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.*

      - name: Build Windows package
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          make win-package

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: win/kel-agent.msi
          if-no-files-found: error

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - release-debian
      - release-flatpak
      - release-macos
      - release-windows
    steps:
      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: deb-*
          merge-multiple: true

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak
          path: release-artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: release-artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: release-artifacts

      - name: List release artifacts
        run: ls -lah release-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/*.deb
            release-artifacts/kel-agent.flatpak
            release-artifacts/kel-agent_mac.pkg
            release-artifacts/kel-agent.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
